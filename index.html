<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Word Battle</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
body {
  height: 100vh;
  display:flex; align-items:center; justify-content:center;
  background: linear-gradient(-45deg,#667eea,#764ba2,#ff6ec4,#7873f5);
  background-size:400% 400%;
  animation: gradientMove 10s ease infinite;
  color:white;
  overflow:hidden;
}
@keyframes gradientMove {
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius:24px;
  padding:30px;
  width:95%; max-width:420px;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
  position:relative;
  z-index:2;
}

#timer { font-size:20px; margin-bottom:10px; }
#result { font-size:26px; font-weight:700; margin:20px 0; min-height:40px; }
button {
  background:white;
  color:#764ba2;
  border:none;
  padding:12px 18px;
  font-size:16px;
  border-radius:50px;
  font-weight:600;
  cursor:pointer;
  margin:5px;
  transition:0.2s;
}
button:active{transform:scale(0.95);}
button:disabled{opacity:0.5; cursor:not-allowed;}
.scoreboard{display:flex; justify-content:space-between; margin-top:20px;}
.team{width:48%; background:rgba(255,255,255,0.2); padding:10px; border-radius:15px;}
.overlay {
  position:absolute; inset:0; background: rgba(0,0,0,0.85);
  display:flex; align-items:center; justify-content:center;
  font-size:42px; font-weight:800; letter-spacing:2px;
  opacity:0; pointer-events:none;
}
.overlay.show { animation: explode 1s ease forwards; }
@keyframes explode { 0%{transform:scale(0.5); opacity:0;} 60%{transform:scale(1.2); opacity:1;} 100%{transform:scale(1); opacity:1;} }
</style>
</head>
<body>

<div class="card">
  <div id="timer">⏱ 60</div>
  <div id="result">Press Start</div>

  <button id="generateBtn" onclick="generateWords()" disabled>Generate</button>
  <button onclick="startTimer()">Start</button>
  <button onclick="resetGame()">Reset</button>

  <div class="scoreboard">
    <div class="team">
      <h3>Team A</h3>
      <div id="scoreA">0</div>
      <button onclick="addScore('A')">+1</button>
    </div>
    <div class="team">
      <h3>Team B</h3>
      <div id="scoreB">0</div>
      <button onclick="addScore('B')">+1</button>
    </div>
  </div>

  <div id="overlay" class="overlay">⏰ TIME'S UP!</div>
</div>

<script>
const nouns = ["cat","mountain","ocean","robot","forest","wizard","castle","planet","storm","dragon"];
const adjectives = ["brave","ancient","mysterious","colorful","silent","fierce","glowing","rapid","gentle","wild"];

let usedCombinations = new Set();
let timeLeft = 60;
let timerInterval = null;
let scoreA = 0;
let scoreB = 0;

const generateBtn = document.getElementById("generateBtn");
const overlay = document.getElementById("overlay");
const buzzer = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function generateWords() {
  if (!timerInterval) return;
  if (usedCombinations.size >= nouns.length * adjectives.length) {
    document.getElementById("result").textContent = "All combinations used!";
    return;
  }
  let combination;
  do {
    const noun = nouns[Math.floor(Math.random() * nouns.length)];
    const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
    combination = adj + " " + noun;
  } while (usedCombinations.has(combination));
  usedCombinations.add(combination);
  document.getElementById("result").textContent = combination;
  if (navigator.vibrate) navigator.vibrate(30);
}

function startTimer() {
  if (timerInterval) return;
  overlay.classList.remove("show");
  generateBtn.disabled = false;
  timeLeft = 60;
  document.getElementById("timer").textContent = "⏱ "+timeLeft;
  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").textContent = "⏱ "+timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timerInterval=null;
      endRound();
    }
  },1000);
}

function endRound() {
  generateBtn.disabled = true;
  document.getElementById("result").textContent = "";
  overlay.classList.add("show");
  buzzer.play();
  if (navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}

function resetGame() {
  usedCombinations.clear();
  clearInterval(timerInterval);
  timerInterval=null;
  scoreA=0; scoreB=0; timeLeft=60;
  document.getElementById("timer").textContent="⏱ 60";
  document.getElementById("result").textContent="Press Start";
  document.getElementById("scoreA").textContent=0;
  document.getElementById("scoreB").textContent=0;
  overlay.classList.remove("show");
  generateBtn.disabled=true;
}

function addScore(team){
  if(team==="A"){scoreA++;document.getElementById("scoreA").textContent=scoreA;}
  else{scoreB++;document.getElementById("scoreB").textContent=scoreB;}
}
</script>

</body>
</html>
