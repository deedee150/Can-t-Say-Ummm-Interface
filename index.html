<div class="card">
  <!-- Reset button clearly above timer -->
  <div class="reset-group" style="margin-bottom:30px; text-align:center;">
    <button style="width:50%; font-size:20px; padding:16px 24px;" onclick="resetGame()">🔄 Reset</button>
  </div>

  <div id="timer">⏱ 60</div>
  <div id="result">Press Start</div>

  <div class="button-group">
    <button id="startBtn" onclick="startGame()">▶️ Start</button>
    <button id="pauseBtn" onclick="pauseGame()" disabled>⏸ Pause</button>
    <button id="generateBtn" onclick="generateWords()" disabled>📝 Generate</button>
  </div>
  ...
</div>
