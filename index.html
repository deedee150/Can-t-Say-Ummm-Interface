<script>
const nouns = ["cat","mountain","ocean","robot","forest","wizard","castle","planet","storm","dragon"];
const adjectives = ["brave","ancient","mysterious","colorful","silent","fierce","glowing","rapid","gentle","wild"];
const emojis = ["🐱","🗻","🌊","🤖","🌳","🧙","🏰","🪐","⛈️","🐉"]; // Matches nouns by index

let usedCombinations = new Set();
let timeLeft = 60;
let timerInterval = null;
let scoreA = 0;
let scoreB = 0;

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const generateBtn = document.getElementById("generateBtn");
const overlay = document.getElementById("overlay");
const resultDiv = document.getElementById("result");
const buzzer = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function generateWords() {
  if (!timerInterval) return; // Only generate if timer is running
  if (usedCombinations.size >= nouns.length * adjectives.length) {
    resultDiv.textContent = "All combinations used!";
    return;
  }
  let combination;
  let index;
  do {
    index = Math.floor(Math.random() * nouns.length);
    const noun = nouns[index];
    const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
    combination = adj + " " + noun + " " + emojis[index];
  } while (usedCombinations.has(combination));
  usedCombinations.add(combination);
  resultDiv.textContent = combination;
  if (navigator.vibrate) navigator.vibrate(30);

  // Optional: small pop animation
  resultDiv.style.transform = "scale(1.2)";
  setTimeout(()=>{ resultDiv.style.transform = "scale(1)"; }, 150);
}
</script>
